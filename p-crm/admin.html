<script>

const API = "http://localhost:5000/api/complaints";

document.addEventListener("DOMContentLoaded", loadComplaints);

async function loadComplaints(){

  const res = await fetch(API);
  const complaints = await res.json();

  let table = document.getElementById("complaintTable");

  let pending = 0;
  let resolved = 0;

  complaints.forEach(c => {

    let row = table.insertRow(-1);

    row.insertCell(0).innerText = c.trackingId;
    row.insertCell(1).innerText = c.name;
    row.insertCell(2).innerText = c.area;
    row.insertCell(3).innerText = c.status;

    if(c.status === "Pending") pending++;
    if(c.status === "Resolved") resolved++;

    let btn = document.createElement("button");
    btn.innerText = "Mark Resolved";

    btn.onclick = async function(){

      await fetch(API + "/" + c._id,{
        method:"PUT",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          status:"Resolved"
        })
      });

      location.reload();
    };

    row.insertCell(4).appendChild(btn);

  });

  // Chart
  new Chart(document.getElementById("myChart"), {
    type: "pie",
    data: {
      labels: ["Pending","Resolved"],
      datasets: [{
        data: [pending, resolved],
        backgroundColor:["orange","green"]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

}

</script>
